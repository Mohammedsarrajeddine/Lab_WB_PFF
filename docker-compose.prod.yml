# =============================================================================
# Production Docker Compose — PFF Lab
# Topology: Caddy (TLS) → frontend (nginx:80) + backend (uvicorn:8000) → db
# =============================================================================

services:
  # ── Reverse Proxy (auto-TLS via Let's Encrypt) ─────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 / QUIC
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # TLS certificates
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-pff_lab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pff} -d ${POSTGRES_DB:-pff_lab}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Backend (FastAPI + Uvicorn) ────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE must be set}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pff}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pff_lab}
    networks:
      - backend_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Frontend (nginx serving static build) ──────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE must be set}
    pull_policy: always
    restart: unless-stopped
    networks:
      - frontend_net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
