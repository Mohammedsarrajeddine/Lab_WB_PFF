name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v4

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi_app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: fastapi_app/pyproject.toml

      - name: Install backend toolchain
        run: |
          python -m pip install --upgrade pip build bandit pip-audit
          python -m pip install -e ".[dev]"

      - name: Backend quality gates
        run: bash ../scripts/ci/backend-quality.sh

      - name: Backend security scan
        run: |
          bandit -q -r app -x tests
          pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-pff-lab
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: frontend-pff-lab/package-lock.json

      - name: Install frontend toolchain
        run: npm ci

      - name: Frontend quality gates
        run: bash ../scripts/ci/frontend-quality.sh

      - name: Frontend dependency audit
        run: npm audit --omit=dev --audit-level=high

  integration:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg18-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastapi_app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      AUTH_SECRET_KEY: test-secret-key-that-is-at-least-32-characters-long!!
      ENVIRONMENT: local
      WHATSAPP_SIMULATION_MODE: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/fastapi_app
    defaults:
      run:
        working-directory: fastapi_app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: fastapi_app/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Integration tests
        run: bash ../scripts/ci/backend-integration.sh

  docker:
    runs-on: ubuntu-latest
    needs:
      - integration
    steps:
      - uses: actions/checkout@v6

      - name: Prepare production env file
        run: cp .env.production.example .env

      - name: Validate production compose file
        env:
          BACKEND_IMAGE: ghcr.io/example/backend:ci
          FRONTEND_IMAGE: ghcr.io/example/frontend:ci
        run: docker compose -f docker-compose.prod.yml config

      - name: Build backend image
        run: docker build -t app-backend:ci ./fastapi_app

      - name: Build frontend image
        run: docker build -t app-frontend:ci ./frontend-pff-lab
